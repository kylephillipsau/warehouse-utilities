<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B2C Labels</title>
  <link rel="stylesheet" href="labels.css" />
  <script src="labels.js"></script>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>
  <header id="header">
    <img id="logo" src="B2C-Logo.svg" alt="B2C Furniture">
    <div id="controls">
      <div>
        <label for="labelText">Label Text</label>
        <input type="text" id="labelText" name="labelText">
      </div>
      <div>
        <label for="labelQuantity">Quantity</label>
        <input type="number" id="labelQuantity" name="labelQuantity" placeholder="1" max="100">
      </div>
      <div>
        <input type="button" value="Add Item" onclick="addItem()" />
        <input type="button" value="Update" onclick="updateLabels()" />
      </div>
      <div>
        <input type="radio" id="portrait" name="orientation" value="portrait" checked="checked">
        <label for="portrait">Portrait</label>
        <input type="radio" id="landscape" name="orientation" value="landscape">
        <label for="landscape">Landscape</label>
      </div>
    </div>
    <button id="print-button" onclick="window.print()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
        <!--! Font Awesome Pro 6.1.1 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) Copyright 2022 Fonticons, Inc. -->
        <path
          d="M448 192H64C28.65 192 0 220.7 0 256v96c0 17.67 14.33 32 32 32h32v96c0 17.67 14.33 32 32 32h320c17.67 0 32-14.33 32-32v-96h32c17.67 0 32-14.33 32-32V256C512 220.7 483.3 192 448 192zM384 448H128v-96h256V448zM432 296c-13.25 0-24-10.75-24-24c0-13.27 10.75-24 24-24s24 10.73 24 24C456 285.3 445.3 296 432 296zM128 64h229.5L384 90.51V160h64V77.25c0-8.484-3.375-16.62-9.375-22.62l-45.25-45.25C387.4 3.375 379.2 0 370.8 0H96C78.34 0 64 14.33 64 32v128h64V64z" />
      </svg>
    </button>
  </header>

  <main id="labels-section">
    <ul id="labelList" class="printable"></ul>
  </main>
</body>

</html>
