<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Label Maker V2</title>
  <link rel="stylesheet" href="labels.css" />
  <script src="labels.js"></script>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- <link rel="preload" href="fonts/glacialindifference-bold-webfont.woff" as="font" type="font/woff"
    crossorigin="anonymous">
  <link rel="preload" href="fonts/glacialindifference-regular-webfont.woff" as="font" type="font/woff"
    crossorigin="anonymous">
  <link rel="preload" href="fonts/glacialindifference-bold-webfont.woff2" as="font" type="font/woff2"
    crossorigin="anonymous">
  <link rel="preload" href="fonts/glacialindifference-regular-webfont.woff2" as="font" type="font/woff2"
    crossorigin="anonymous"> -->
</head>

<body>
  <header id="header">
    <div id="details-panel">
      <h1 id="heading">Label Maker V2</h1>
      <div id="subtitle">
        <a id="home" href="index.html">Home</a>
        <a id="source" href="https://github.com/kylephillipsau/warehouse-utilities">Source</a>
        <a id="old-version" href="old/labels.html">v1</a>
      </div>
    </div>
    <div id="controls">
      <div class="control-group">
        <span class="group-label">New label</span>
        <div class="group-row">
          <input type="text" id="labelText" name="labelText" placeholder="Label text" aria-label="Label text"
            onkeypress="enterPress(event)">
          <input type="number" id="labelQuantity" name="labelQuantity" placeholder="Qty" aria-label="Quantity" min="1"
            max="100" onkeypress="enterPress(event)">
          <input type="button" class="btn btn-primary" value="Add"
            onclick="addItem(document.getElementById('labelText').value, document.getElementById('labelQuantity').value)" />
          <input type="button" class="btn" id="addImage" value="Add image"
            onclick="document.getElementById('new-image-file').click()">
          <input type="button" class="btn" id="inputMultiple" value="Import list" onclick="toggleMultilineImport()">
        </div>
      </div>
      <div class="control-group">
        <span class="group-label">Label size</span>
        <div class="group-row">
          <select id="label-size" aria-label="Label size preset" onchange="labelSizeChanged()">
            <option value="standard">Standard (100 &times; 22 mm)</option>
            <option value="address">Address (89 &times; 28 mm)</option>
            <option value="large-address">Large address (89 &times; 36 mm)</option>
            <option value="shipping">Shipping (100 &times; 150 mm)</option>
            <option value="custom">Custom&hellip;</option>
          </select>
          <span id="custom-size" hidden>
            <input type="number" id="custom-width" min="10" max="500" step="0.5"
              aria-label="Label width in millimetres" oninput="labelSizeChanged()">
            &times;
            <input type="number" id="custom-height" min="10" max="500" step="0.5"
              aria-label="Label height in millimetres" oninput="labelSizeChanged()">
            mm
          </span>
        </div>
      </div>
      <div class="control-group">
        <span class="group-label">Page</span>
        <div class="segmented">
          <input type="radio" id="portrait" name="orientation" value="portrait" onclick="updateLabels()">
          <label for="portrait">Portrait</label>
          <input type="radio" id="landscape" name="orientation" value="landscape" checked="checked"
            onclick="updateLabels()">
          <label for="landscape">Landscape</label>
        </div>
      </div>
      <button id="export-button" class="btn" onclick="openExportDialog()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" aria-hidden="true">
          <!--! Font Awesome Free 6.1.1 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free (Icons: CC BY 4.0, Fonts: SIL OFL 1.1, Code: MIT License) Copyright 2022 Fonticons, Inc. -->
          <path
            d="M288 32c0-17.7-14.3-32-32-32s-32 14.3-32 32V274.7l-73.4-73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l128 128c12.5 12.5 32.8 12.5 45.3 0l128-128c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L288 274.7V32zM64 352c-35.3 0-64 28.7-64 64v32c0 35.3 28.7 64 64 64H448c35.3 0 64-28.7 64-64V416c0-35.3-28.7-64-64-64H346.5l-45.3 45.3c-25 25-65.5 25-90.5 0L165.5 352H64zm368 56a24 24 0 1 1 0 48 24 24 0 1 1 0-48z" />
        </svg>
        Export
      </button>
      <button id="print-button" class="btn" onclick="window.print()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" aria-hidden="true">
          <!--! Font Awesome Pro 6.1.1 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) Copyright 2022 Fonticons, Inc. -->
          <path
            d="M448 192H64C28.65 192 0 220.7 0 256v96c0 17.67 14.33 32 32 32h32v96c0 17.67 14.33 32 32 32h320c17.67 0 32-14.33 32-32v-96h32c17.67 0 32-14.33 32-32V256C512 220.7 483.3 192 448 192zM384 448H128v-96h256V448zM432 296c-13.25 0-24-10.75-24-24c0-13.27 10.75-24 24-24s24 10.73 24 24C456 285.3 445.3 296 432 296zM128 64h229.5L384 90.51V160h64V77.25c0-8.484-3.375-16.62-9.375-22.62l-45.25-45.25C387.4 3.375 379.2 0 370.8 0H96C78.34 0 64 14.33 64 32v128h64V64z" />
        </svg>
        Print
      </button>
    </div>
  </header>

  <dialog id="import-dialog">
    <div id="import-dialog-body">
      <span class="group-label">Import list</span>
      <p id="import-hint">Paste or type below, one label per line, or drop in a text file.</p>
      <textarea id="multiline-input" name="text" placeholder="AISLE 4&#10;RETURNS BAY&#10;DISPATCH"
        oninput="updateImportCount()"></textarea>
      <div id="file-drop" onclick="document.getElementById('import-file').click()">
        Drag a text file here, or <span id="file-browse">browse</span>
      </div>
      <input type="file" id="import-file" accept=".txt,.csv,.json,text/plain,application/json"
        onchange="readImportFile(this.files[0]); this.value = '';" hidden>
      <div id="import-actions">
        <button type="button" class="btn" id="multiline-input-cancel" onclick="multilineImportCancel()">Cancel</button>
        <button type="button" class="btn btn-primary" id="multiline-input-submit"
          onclick="multilineImport()">Import labels</button>
      </div>
    </div>
  </dialog>

  <dialog id="export-dialog">
    <div id="export-dialog-body">
      <span class="group-label">Save labels</span>
      <p id="export-hint">Save a label file to keep images, or plain text for a simple list.</p>
      <div id="export-actions">
        <button type="button" class="btn" id="export-json" onclick="exportJson()">Label file (.json)</button>
        <button type="button" class="btn" id="export-text" onclick="exportText()">Plain text (.txt)</button>
      </div>
      <div id="export-close-row">
        <button type="button" class="btn" id="export-cancel" onclick="document.getElementById('export-dialog').close()">Cancel</button>
      </div>
    </div>
  </dialog>

  <!-- Hidden file inputs for picking images. The per-label picker remembers
       which label to apply to via a variable set when its tool is clicked. -->
  <input type="file" id="new-image-file" accept="image/*"
    onchange="addImageLabel(this.files[0]); this.value = '';" hidden>
  <input type="file" id="label-image-file" accept="image/*"
    onchange="applyPickedImage(this.files[0]); this.value = '';" hidden>

  <main id="labels-section">
    <ul id="labelList" class="printable"></ul>
  </main>

  <div id="undo-toast" role="status">
    <span>Label deleted</span>
    <button id="undo-button" class="btn" onclick="undoDelete()">Undo</button>
  </div>
</body>

</html>
